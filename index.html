<!doctype html><html lang=en><meta charset=utf-8>
<title>PIXELIZER — image & video</title>
<meta name=viewport content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
<style>
 :root{--cream:#f4ead2;--gold:#caa24a;--red:#b6452f;--ink:#2b2620;--bg:#1a1714;--panel:#241f1a}
 *{box-sizing:border-box}body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--cream);height:100vh;display:flex;flex-direction:column;overflow:hidden}
 #bar{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:2px solid var(--gold)}
 #brand{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:1px solid #3a332b;border-radius:8px;background:#1f1b16;color:var(--gold);font-weight:700;font-size:15px;line-height:1.2;padding:6px 10px}
 #brand select{margin-top:6px;font:inherit;font-size:12px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--cream);color:var(--ink);border:2px solid var(--ink);cursor:pointer}
 .grp{display:flex;flex-direction:column;gap:4px;padding:4px 10px;border:1px solid #3a332b;border-radius:8px;background:#1f1b16}
 .grp .row{display:flex;gap:6px;align-items:center;flex-wrap:nowrap} .grp .lbl{font-size:10px;letter-spacing:.04em;color:var(--gold);text-transform:uppercase;opacity:.8}
 label{font-size:12px;display:flex;gap:4px;align-items:center;white-space:nowrap}
 button{font:inherit;font-size:13px;padding:6px 11px;border:2px solid var(--ink);border-radius:7px;background:var(--cream);color:var(--ink);font-weight:700;cursor:pointer;white-space:nowrap}
 button.on{background:var(--red);color:#fff} button.save{background:var(--gold)} button.step{min-width:30px;padding:6px 8px}
 input[type=range]{width:96px}
 #topbar{padding:5px 12px;font-size:12px;background:#1f1b16;border-bottom:1px solid #3a332b;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
 #statusMsg{color:var(--gold);font-weight:700} #legend{opacity:.7}
 #main{flex:1;display:flex;min-height:0}
 #rail{width:120px;background:#161310;border-right:1px solid #3a332b;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:6px}
 .thumb{position:relative;border:2px solid transparent;border-radius:6px;overflow:hidden;cursor:pointer;background:#000;flex-shrink:0}
 .thumb.active{border-color:var(--gold)} .thumb:hover{filter:brightness(1.15);outline:1px solid var(--gold)} .thumb img{width:100%;display:block}
 .thumb .badge{position:absolute;top:2px;left:2px;font-size:11px;background:#000a;border-radius:4px;padding:0 3px}
 .thumb .del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:#000b;color:#fff;font-size:11px;line-height:16px;text-align:center;cursor:pointer;display:none;border:1px solid #fff7}
 .thumb:hover .del{display:block} .thumb .del:hover{background:var(--red)}
 .thumb .n{position:absolute;bottom:0;left:0;right:0;font-size:10px;background:#000a;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .railhint{color:#8a7f70;font-size:11px;text-align:center;line-height:1.7;padding:18px 6px;border:2px dashed #3a332b;border-radius:8px}
 #main.drag{outline:3px dashed var(--gold);outline-offset:-8px;background:#241f17}
 #stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0;position:relative}
 canvas#view{max-width:100%;max-height:100%;background:#000;border:1px solid #000;image-rendering:pixelated}
 video#vid{max-width:100%;max-height:78%;background:#000;border:1px solid #000;display:none}
 #vidbox{display:none;flex-direction:column;align-items:center;gap:10px}
 #intro{max-width:540px;text-align:center;line-height:1.7;font-size:14px;opacity:.95;padding:20px}
 #intro h1{color:var(--gold);font-size:24px;margin:0 0 12px} #intro .sub{font-size:12px;opacity:.65;margin-top:14px;line-height:1.6}
 #spinner{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(20,18,15,.75);z-index:8}
 #spinner .sp{width:46px;height:46px;border:5px solid #5555;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
 @keyframes spin{to{transform:rotate(360deg)}}
 #spinText{color:var(--gold);font-weight:700}
 kbd{background:#3a332b;border:1px solid #000;border-radius:4px;padding:1px 5px;font-size:11px}
</style>
<body>
<div id=bar>
 <div id=brand>🟦 PIXELIZER
  <select id=lang><option value=en>EN<option value=ko>한국어<option value=ja>日本語<option value=zh>中文</select></div>
 <div class=grp><span class=lbl data-i18n=file></span><div class=row>
   <button id=loadBtn data-i18n=load></button><input id=fileIn type=file accept="image/*,video/*" multiple hidden>
   <button id=saveOne data-i18n=saveOne></button><button id=save class=save data-i18n=saveAll></button></div></div>
 <div class=grp><span class=lbl data-i18n=pset></span><div class=row>
   <label><span data-i18n=psize></span><input id=psize type=range min=2 max=40 value=3><b id=pv>3</b></label>
   <label><span data-i18n=colors></span><input id=colors type=range min=2 max=64 value=30><b id=cvv>30</b></label>
   <label><span data-i18n=sat></span><input id=sat type=range min=0.5 max=2 step=0.1 value=1.4><b id=sv>1.4</b></label>
   <label><input id=dither type=checkbox> <span data-i18n=dither></span></label></div></div>
 <div class=grp><span class=lbl data-i18n=view></span><div class=row>
   <button id=origBtn data-i18n=orig></button></div></div>
 <div class=grp><span class=lbl data-i18n=vidg></span><div class=row>
   <button id=vplay>▶</button><button id=exportBtn class=save data-i18n=vexport></button></div></div>
 <span id=legend style="align-self:center;font-size:11px;opacity:.7" data-i18n=legend></span>
</div>
<div id=topbar><span id=statusMsg></span><span id=legend2 data-i18n=tip></span></div>
<div id=main>
 <div id=rail></div>
 <div id=stage>
   <div id=intro><h1>🟦 PIXELIZER</h1>
     <div data-i18n=introBody></div>
     <div class=sub data-i18n=introSub></div></div>
   <canvas id=view width=480 height=320 style="display:none"></canvas>
   <video id=vid muted loop playsinline style="display:none"></video>
   <div id=spinner><div class=sp></div><span id=spinText></span></div>
 </div>
</div>
<script>
const I18N={
 en:{file:"File",load:"🖼 Load",saveOne:"⬇ Save this",saveAll:"⬇ Save all (zip)",pset:"Pixel settings",psize:"Pixel size",colors:"Colors",sat:"Saturation",dither:"Dither",view:"View",orig:"👁 Original",vidg:"Video",vexport:"🎬 Export pixel video",legend:"images: live · video: select then Export",tip:"Drag images/videos in · adjust settings live",introBody:"Turn images & videos into <b>pixel art</b> — grid-aligned downscale + limited palette.",introSub:"🔒 Everything runs in your browser; nothing is uploaded.<br>Load above or <b>drag files onto this screen</b>.",vhint:"Adjust settings, then press Export (records in real time, with audio).",exporting:"Recording pixel video… (plays in real time)",done:"Done.",saved:"Saved",zipMaking:"Zipping…",empty:"Queue empty — load or drag files."},
 ko:{file:"파일",load:"🖼 불러오기",saveOne:"⬇ 이 장 저장",saveAll:"⬇ 전체 저장(zip)",pset:"픽셀 설정",psize:"픽셀 크기",colors:"색상 수",sat:"채도",dither:"디더",view:"보기",orig:"👁 원본",vidg:"영상",vexport:"🎬 픽셀 영상 내보내기",legend:"이미지=실시간 · 영상=선택 후 내보내기",tip:"이미지/영상 드래그 · 설정 실시간 반영",introBody:"이미지·영상을 <b>픽셀아트</b>로 — 그리드 정렬 축소 + 제한 팔레트.",introSub:"🔒 전부 브라우저에서 처리, 어디에도 업로드 안 됨.<br>위에서 불러오거나 <b>이 화면으로 파일을 끌어다 놓으세요</b>.",vhint:"설정 맞춘 뒤 내보내기 (실시간 녹화·오디오 포함).",exporting:"픽셀 영상 녹화 중… (실시간 재생)",done:"완료.",saved:"저장됨",zipMaking:"zip 생성 중…",empty:"큐가 비었어요 — 불러오거나 끌어다 놓으세요."},
 ja:{file:"ファイル",load:"🖼 読み込み",saveOne:"⬇ この画像保存",saveAll:"⬇ 全て保存(zip)",pset:"ピクセル設定",psize:"ピクセル",colors:"色数",sat:"彩度",dither:"ディザ",view:"表示",orig:"👁 原画",vidg:"動画",vexport:"🎬 ピクセル動画書き出し",legend:"画像=即時 · 動画=選択後 書き出し",tip:"画像/動画をドラッグ · 設定は即反映",introBody:"画像・動画を<b>ピクセルアート</b>に — グリッド縮小+限定パレット。",introSub:"🔒 全てブラウザ内で処理、アップロードなし。<br>上から読み込むか<b>この画面にドラッグ</b>。",vhint:"設定後に書き出し（リアルタイム録画・音声付き）。",exporting:"ピクセル動画を録画中…（リアルタイム再生）",done:"完了。",saved:"保存しました",zipMaking:"zip作成中…",empty:"キューが空です — 読み込むかドラッグ。"},
 zh:{file:"文件",load:"🖼 载入",saveOne:"⬇ 保存本张",saveAll:"⬇ 全部保存(zip)",pset:"像素设置",psize:"像素大小",colors:"颜色数",sat:"饱和度",dither:"抖动",view:"查看",orig:"👁 原图",vidg:"视频",vexport:"🎬 导出像素视频",legend:"图片=实时 · 视频=选择后导出",tip:"拖入图片/视频 · 设置实时生效",introBody:"把图片和视频变成<b>像素艺术</b> — 网格缩小+有限调色板。",introSub:"🔒 全部在你的浏览器中处理，绝不上传。<br>上方载入或<b>拖文件到此界面</b>。",vhint:"调好设置后导出（实时录制，含音频）。",exporting:"正在录制像素视频…（实时播放）",done:"完成。",saved:"已保存",zipMaking:"生成zip中…",empty:"队列为空 — 载入或拖入。"}
};
let LANG=(localStorage.getItem('pxl_lang'))||'en';
const tr=k=>(I18N[LANG]&&I18N[LANG][k]!=null)?I18N[LANG][k]:I18N.en[k];
const $=id=>document.getElementById(id);
const mk=(w,h)=>{const c=document.createElement('canvas');c.width=w;c.height=h;return c;};
const st=m=>{const e=$('statusMsg');e.textContent=m;};
let PIXEL=3,COLORS=30,SAT=1.4,DITHER=false,origToggle=false,spaceOrig=false,vidPal=null,vidRunning=false;
function isOrig(){return origToggle||spaceOrig;}
function syncOrigBtn(){document.getElementById('origBtn').classList.toggle('on',isOrig());}
let items=[],cur=-1;
const view=$('view'),vx=view.getContext('2d'),vid=$('vid');

/* ---------- 픽셀화 ---------- */
function chRange(b){let mn=[255,255,255],mx=[0,0,0];for(const p of b)for(let c=0;c<3;c++){if(p[c]<mn[c])mn[c]=p[c];if(p[c]>mx[c])mx[c]=p[c];}let ch=0,range=-1;for(let c=0;c<3;c++){const r=mx[c]-mn[c];if(r>range){range=r;ch=c;}}return{ch,range};}
function quantize(d,n){let pts=[];for(let i=0;i<d.length;i+=4)pts.push([d[i],d[i+1],d[i+2]]);let boxes=[pts];
 while(boxes.length<n){let bi=-1,br=-1;boxes.forEach((b,idx)=>{if(b.length<2)return;const r=chRange(b).range;if(r>br){br=r;bi=idx;}});if(bi<0)break;
  const b=boxes[bi],ch=chRange(b).ch;b.sort((p,q)=>p[ch]-q[ch]);const mid=b.length>>1;boxes.splice(bi,1,b.slice(0,mid),b.slice(mid));}
 return boxes.filter(b=>b.length).map(b=>{const a=[0,0,0];for(const p of b){a[0]+=p[0];a[1]+=p[1];a[2]+=p[2];}const L=b.length;return[Math.round(a[0]/L),Math.round(a[1]/L),Math.round(a[2]/L)];});}
const cl=v=>v<0?0:v>255?255:v;
function applySat(d,s){for(let i=0;i<d.length;i+=4){const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];d[i]=cl(g+(d[i]-g)*s);d[i+1]=cl(g+(d[i+1]-g)*s);d[i+2]=cl(g+(d[i+2]-g)*s);}}
function applyPalette(d,pal,dither,w,h){const near=(r,g,b)=>{let bi=0,bd=1e18;for(let i=0;i<pal.length;i++){const p=pal[i],dd=(r-p[0])**2+(g-p[1])**2+(b-p[2])**2;if(dd<bd){bd=dd;bi=i;}}return pal[bi];};
 if(!dither){for(let i=0;i<d.length;i+=4){const c=near(d[i],d[i+1],d[i+2]);d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];}return;}
 for(let y=0;y<h;y++)for(let x=0;x<w;x++){const o=(y*w+x)*4,or=d[o],og=d[o+1],ob=d[o+2],c=near(or,og,ob);d[o]=c[0];d[o+1]=c[1];d[o+2]=c[2];
  const er=or-c[0],eg=og-c[1],eb=ob-c[2],sp=(xx,yy,f)=>{if(xx<0||xx>=w||yy<0||yy>=h)return;const oo=(yy*w+xx)*4;d[oo]=cl(d[oo]+er*f);d[oo+1]=cl(d[oo+1]+eg*f);d[oo+2]=cl(d[oo+2]+eb*f);};
  sp(x+1,y,7/16);sp(x-1,y+1,3/16);sp(x,y+1,5/16);sp(x+1,y+1,1/16);}}
function pixelizeTo(out,src,W,H){const tw=Math.max(1,Math.round(W/PIXEL)),th=Math.max(1,Math.round(H/PIXEL));
 const s=mk(tw,th),sc=s.getContext('2d');sc.imageSmoothingEnabled=true;sc.drawImage(src,0,0,tw,th);
 const id=sc.getImageData(0,0,tw,th),d=id.data;if(SAT!==1)applySat(d,SAT);const pal=quantize(d,COLORS);applyPalette(d,pal,DITHER,tw,th);sc.putImageData(id,0,0);
 out.width=W;out.height=H;const oc=out.getContext('2d');oc.imageSmoothingEnabled=false;oc.clearRect(0,0,W,H);oc.drawImage(s,0,0,tw,th,0,0,W,H);}

/* ---------- 렌더(이미지) ---------- */
const CI=()=>items[cur];
function render(){const it=CI();if(!it||it.video)return;view.style.display='block';$('intro').style.display='none';
 if(isOrig()){view.width=it.img.naturalWidth;view.height=it.img.naturalHeight;view.getContext('2d').drawImage(it.img,0,0);}
 else pixelizeTo(view,it.img,it.img.naturalWidth,it.img.naturalHeight);}
function showVideoLive(it){$('intro').style.display='none';view.style.display='block';vid.src=it.url;vidPal=null;vid.muted=true;
 vid.play().then(()=>{document.getElementById('vplay').textContent='⏸';}).catch(()=>{document.getElementById('vplay').textContent='▶';});
 if(!vidRunning){vidRunning=true;requestAnimationFrame(videoTick);}}
function ensureVidPal(){if(vidPal||vid.readyState<2)return;const W=vid.videoWidth,H=vid.videoHeight,tw=Math.max(1,Math.min(Math.round(W/PIXEL),480)),th=Math.max(1,Math.round(tw*H/W));const sc=mk(tw,th).getContext('2d');sc.imageSmoothingEnabled=true;sc.drawImage(vid,0,0,tw,th);const d=sc.getImageData(0,0,tw,th).data;if(SAT!==1)applySat(d,SAT);vidPal=quantize(d,COLORS);}
function pixelizeVidFrame(out){const W=vid.videoWidth,H=vid.videoHeight;if(!W||!H)return;const tw=Math.max(1,Math.min(Math.round(W/PIXEL),480)),th=Math.max(1,Math.round(tw*H/W));const s=mk(tw,th),sc=s.getContext('2d');sc.imageSmoothingEnabled=true;sc.drawImage(vid,0,0,tw,th);const id=sc.getImageData(0,0,tw,th),d=id.data;if(SAT!==1)applySat(d,SAT);ensureVidPal();if(vidPal)applyPalette(d,vidPal,DITHER,tw,th);sc.putImageData(id,0,0);out.width=W;out.height=H;const oc=out.getContext('2d');oc.imageSmoothingEnabled=false;oc.drawImage(s,0,0,tw,th,0,0,W,H);}
function videoTick(){const it=CI();if(!it||!it.video){vidRunning=false;return;}if(vid.readyState>=2&&vid.videoWidth){if(isOrig()){view.width=vid.videoWidth;view.height=vid.videoHeight;view.getContext('2d').drawImage(vid,0,0);}else pixelizeVidFrame(view);}requestAnimationFrame(videoTick);}
document.addEventListener('DOMContentLoaded',()=>{});
document.getElementById('vplay').onclick=()=>{if(vid.paused){vid.play();document.getElementById('vplay').textContent='⏸';}else{vid.pause();document.getElementById('vplay').textContent='▶';}};

/* ---------- 큐 ---------- */
function buildRail(){const rail=$('rail');rail.innerHTML='';if(!items.length){rail.innerHTML='<div class=railhint>🖼🎬<br>'+tr('empty')+'</div>';return;}
 items.forEach((it,i)=>{const d=document.createElement('div');d.className='thumb'+(i===cur?' active':'');d.onclick=()=>select(i);
  const im=document.createElement('img');im.src=it.thumb;d.appendChild(im);
  if(it.video){const b=document.createElement('div');b.className='badge';b.textContent='🎬';d.appendChild(b);}
  const nm=document.createElement('div');nm.className='n';nm.textContent=it.name;d.appendChild(nm);
  const del=document.createElement('div');del.className='del';del.textContent='✕';del.onclick=e=>{e.stopPropagation();removeItem(i);};d.appendChild(del);
  rail.appendChild(d);});}
function select(i){cur=i;buildRail();const it=CI();$('exportBtn').style.display=it.video?'':'none';$('vplay').style.display=it.video?'':'none';if(it.video)showVideoLive(it);else render();}
function removeItem(i){const it=items[i];if(it.url)URL.revokeObjectURL(it.url);items.splice(i,1);if(!items.length){cur=-1;view.style.display='none';$('vidbox').style.display='none';$('intro').style.display='';buildRail();st(tr('empty'));return;}if(i<cur)cur--;if(cur>items.length-1)cur=items.length-1;if(cur<0)cur=0;buildRail();select(cur);}
function addFiles(fs){const arr=[...fs];let pend=arr.length;if(!pend)return;
 arr.forEach(f=>{const isV=f.type.startsWith('video/');
  if(isV){const url=URL.createObjectURL(f),v=document.createElement('video');v.src=url;v.muted=true;v.onloadeddata=()=>{v.currentTime=Math.min(0.1,(v.duration||1)/2);};v.onseeked=()=>{const tw=120,th=Math.round(120*v.videoHeight/v.videoWidth),tc=mk(tw,th);tc.getContext('2d').drawImage(v,0,0,tw,th);items.push({name:f.name,video:true,url,thumb:tc.toDataURL()});if(--pend===0)fin();};v.onerror=()=>{if(--pend===0)fin();};}
  else{const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>{const tw=120,th=Math.round(120*im.naturalHeight/im.naturalWidth),tc=mk(tw,th);tc.getContext('2d').drawImage(im,0,0,tw,th);items.push({name:f.name,img:im,thumb:tc.toDataURL()});if(--pend===0)fin();};im.src=r.result;};r.readAsDataURL(f);}});}
function fin(){buildRail();if(cur<0)select(0);else buildRail();st("");}
$('fileIn').onchange=e=>{addFiles(e.target.files);e.target.value='';};
$('loadBtn').onclick=()=>$('fileIn').click();
{const dz=$('main');['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));dz.addEventListener('drop',e=>{const fs=[...(e.dataTransfer?e.dataTransfer.files:[])].filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/'));if(fs.length)addFiles(fs);});}

/* ---------- 컨트롤 ---------- */
$('psize').oninput=e=>{PIXEL=+e.target.value;$('pv').textContent=e.target.value;vidPal=null;render();};
$('colors').oninput=e=>{COLORS=+e.target.value;$('cvv').textContent=e.target.value;vidPal=null;render();};
$('sat').oninput=e=>{SAT=+e.target.value;$('sv').textContent=e.target.value;vidPal=null;render();};
$('dither').onchange=e=>{DITHER=e.target.checked;vidPal=null;render();};
$('origBtn').onclick=()=>{origToggle=!origToggle;syncOrigBtn();render();};

/* ---------- 저장(이미지) ---------- */
function renderFull(it){const o=mk(1,1);pixelizeTo(o,it.img,it.img.naturalWidth,it.img.naturalHeight);return o;}
$('saveOne').onclick=()=>{const it=CI();if(!it||it.video)return;renderFull(it).toBlob(b=>{const a=document.createElement('a');a.download=it.name.replace(/\.[^.]+$/,'')+'_PIXEL.png';a.href=URL.createObjectURL(b);a.click();},'image/png');st(tr('saved'));};
$('save').onclick=async()=>{const imgs=items.filter(x=>!x.video);if(!imgs.length)return;st(tr('zipMaking'));const zip=new JSZip();for(const it of imgs){const b=await new Promise(r=>renderFull(it).toBlob(r,'image/png'));zip.file(it.name.replace(/\.[^.]+$/,'')+'_PIXEL.png',b);}const out=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.download='pixelized.zip';a.href=URL.createObjectURL(out);a.click();st(tr('done'));};

/* ---------- 영상 내보내기(실시간 녹화) ---------- */
$('exportBtn').onclick=async()=>{const it=CI();if(!it||!it.video)return;
 const W=vid.videoWidth,H=vid.videoHeight,out=mk(W,H);
